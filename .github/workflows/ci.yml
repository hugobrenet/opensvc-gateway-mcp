name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Unit And Static Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Compile Python files
        run: python -m compileall -q src/opensvc_gateway_mcp tests

      - name: Run Ruff
        run: python -m ruff check src/opensvc_gateway_mcp tests

      - name: Check whitespace errors
        run: git diff --check
